<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Breach Preloader</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="../src/data/manifest.json">
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#ff003c">
    <meta name="msapplication-navbutton-color" content="#ff003c">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23050505' width='100' height='100'/><text y='.9em' font-size='90' fill='%23ff003c'>></text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23050505' width='100' height='100'/><text y='.9em' font-size='90' fill='%23ff003c'>></text></svg>">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="../src/styles/styles.css">
</head>
<body>
    <!-- Preloader Overlay -->
    <div id="preloader" class="preloader-overlay">
        <div class="scanline"></div>
        <div class="noise"></div>
        <div class="bg-grid"></div>
        
        <div class="loader-content">
            <!-- Header -->
            <div class="header-line">
                <div class="left-header">
                    <span class="status-label">SYS.STATUS:</span>
                    <span id="status-text" class="status-value">INITIALIZING</span>
                </div>
                <div class="right-header">
                    <span class="threat-label">THREAT LEVEL:</span>
                    <span id="threat-level" class="threat-value">LOW</span>
                </div>
            </div>

            <!-- Main Display -->
            <div class="main-display">
                <h1 id="glitch-title" class="glitch" data-text="SYSTEM_BREACH">SYSTEM_BREACH</h1>
                <div class="terminal-output">
                    <p><span class="prompt">></span> <span id="typing-text">INITIALIZING KERNEL...</span><span class="cursor">_</span></p>
                    <p class="sub-text">ESTABLISHING SECURE CONNECTION...</p>
                </div>
            </div>

            <!-- Progress -->
            <div class="progress-container">
                <div class="progress-bar-bg">
                    <div id="progress-bar" class="progress-bar-fill"></div>
                </div>
                <div class="progress-stats">
                    <span id="percent-text">0%</span>
                    <span class="hex-code" id="hex-code">0x0000</span>
                </div>
            </div>

            <!-- Skip Button -->
            <div class="skip-container" id="skip-container">
                <button id="skip-btn" class="skip-btn">SKIP [ENTER]</button>
            </div>
        </div>

        <!-- Signature -->
        <div class="signature">
            <span class="sig-bracket">[</span> ItsWanheda <span class="sig-bracket">]</span>
        </div>
    </div>

    <!-- Main Content -->
    <main id="main-content" class="main-content">
        <h1>Welcome to the System</h1>
        <p>Access granted. The preloader has completed.</p>
    </main>

    <!-- Scripts -->
    <script src="../src/static/main.js"></script>
</body>
</html>
